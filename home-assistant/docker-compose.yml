  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONFIG_DIR}/nodered:/data
    ports:
      - ${NODERED_PORT}:1880
    restart: unless-stopped

  #esphome:
