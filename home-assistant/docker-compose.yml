  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    security_opt:
      - apparmor:unconfined
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONFIG_DIR}/matter-server:/data
    ports:
      - ${MATTER_PORT}:5580
    restart: unless-stopped
